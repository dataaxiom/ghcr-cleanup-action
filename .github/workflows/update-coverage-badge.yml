name: Update Coverage Badge

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-badge:
    name: Update Coverage Badge
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      # persist-credentials is intentionally on (default) - the job needs the
      # workflow token to push the regenerated badge back to the branch.
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Generate Coverage Report
        run: npm run coverage

      - name: Commit and push badge if changed
        run: |
          if git diff --quiet badges/coverage.svg; then
            echo "Coverage badge unchanged - nothing to commit"
            echo "## Coverage Badge: no change" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          STATEMENTS=$(jq -r '.total.statements.pct' coverage/coverage-summary.json)

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add badges/coverage.svg
          git commit -m "chore: update coverage badge to ${STATEMENTS}%"
          git push

          {
            echo "## Coverage Badge Updated"
            echo ""
            echo "Statements coverage: **${STATEMENTS}%**"
          } >> "$GITHUB_STEP_SUMMARY"
